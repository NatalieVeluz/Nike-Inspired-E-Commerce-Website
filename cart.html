<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="X-UA-Compatible" content="text/html"; charset="utf-8">
        <link rel="stylesheet" href="cart.css">
        <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <script src="cart"></script>
</head>
<body>
    <div class="navbar">
        <nav>
            <img src="logo.png" width="130px" height="50px">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html"> About Us</a></li>
                <li><a href="All_Products.html">Products <i class="fa fa-caret-down"></i></a>
                    <ul class="dropdown">
                        <li><a href="men.html">Men</a></li>
                        <li><a href="women_p.htm">Women</a></li>
                        <li><a href="kids.html">Kids</a></li>
                    </ul>
                </li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="contacts.html">Contact Us</a></li>
                <li><a href="cart.html"> <i class="fa fa-shopping-cart"></i> </i><span id="cartBadge" class="badge">0</span>Cart</a></li>
            </ul>
                <a class="log" href="Login.html"> Sign up </a>
        </nav>
    </div>

    <main class="cart-container">
        <div class="cart-items">
        </div>
    
        <div class="cart-summary">
            <h2 style="margin-top: 60px;">Order Summary</h2>
            <div class="total-price">
                <p>Total: <span id="totalAmount">₱0.00</span></p>
            </div>
            <div class="place-order">
                <button onclick="placeOrder()">Place Order</button>
            </div>
        </div>
        <div class="overlay" id="overlay"></div>
            <div class="popup" id="popup">
            <button class="close-btn" onclick="hidePopup()">✖️</button>
            <h2 style="margin-top: 20px;">Order Placed Successfully!</h2>
            <img src="https://media3.giphy.com/media/U7KEnh6df4Kidklw0N/giphy.gif" alt="Success Image">
        </div>
    </main>


    <script>
         document.addEventListener('DOMContentLoaded', function () {
            displayCartItems();
            updateTotalAmount();
        });

        function displayCartItems() {
            const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
            const cartContainer = document.querySelector('.cart-items');
            cartContainer.innerHTML = '';

     cartItems.forEach(item => {
        const cartItem = document.createElement('div');
        cartItem.classList.add('cart-item');

        let sizeInfo = item.size ? `<p>Size: ${item.size}</p>` : ''; // Check if the product has a size

        cartItem.innerHTML = `
            <div class="product-image">
                <img src="${item.image}" alt="${item.name}">
            </div>
            <div class="product-details">
                <p>${item.name}</p>
                ${sizeInfo}
                <p>${item.quantity} x ₱${item.price.toFixed(2)}</p>
                <button onclick="removeItem('${item.name}')">Remove</button>
            </div>
        `;
        cartContainer.appendChild(cartItem);
    });
}


            function updateTotalAmount() {
                const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
                const totalAmountElement = document.getElementById('totalAmount');
                let totalAmount = 0;

                cartItems.forEach(item => {
                    totalAmount += item.price * item.quantity;
                });

                totalAmountElement.textContent = `₱${totalAmount.toFixed(2)}`;
            }

            function removeItem(productName) {
                let cart = JSON.parse(localStorage.getItem('cart')) || [];
                cart = cart.filter(item => item.name !== productName);
                localStorage.setItem('cart', JSON.stringify(cart));

                displayCartItems();
                updateTotalAmount();
                updateCartBadge();
            }

            function placeOrder() {
                // Add your logic for placing the order
                showPopup();
                
                // Clear the cart after placing the order
                localStorage.removeItem('cart');
                
                // Update UI
                displayCartItems();
                updateTotalAmount();
                updateCartBadge();
            }

            function updateCartBadge() {
                const cart = JSON.parse(localStorage.getItem('cart')) || [];
                const cartBadge = document.getElementById('cartBadge');

                let totalQuantity = 0;
                cart.forEach(item => {
                    totalQuantity += item.quantity;
                });

                if (isNaN(totalQuantity)) {
                    totalQuantity = 0;
                }

                cartBadge.textContent = totalQuantity;
            }

            function addToCart(productName, price, imageUrl) {
                const cart = JSON.parse(localStorage.getItem('cart')) || [];

                const existingItem = cart.find(item => item.name === productName);

                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    cart.push({ name: productName, price: price, quantity: 1, image: imageUrl });
                }

                localStorage.setItem('cart', JSON.stringify(cart));

                updateCartBadge();

                alert(`${productName} added to the cart for ₱${price.toFixed(2)}!`);
            }

            updateCartBadge();

            function showPopup() {
            const overlay = document.getElementById('overlay');
            const popup = document.getElementById('popup');

            overlay.style.display = 'block';
            popup.style.display = 'block';
        }

        function hidePopup() {
            const overlay = document.getElementById('overlay');
            const popup = document.getElementById('popup');

            overlay.style.display = 'none';
            popup.style.display = 'none';
        }

    </script>
</body>
</html>
